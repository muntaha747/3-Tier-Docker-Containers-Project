############# Nginx Container #############

services:
  nginx:
    build:
      context: ./nginx
    container_name: "nginx-container"
    ports:
      - "80:80"
    networks: 
      - "notes-app"
    depends_on:
      - "django"
    restart: "always"


 ############# MYSQL CONTAINER #############
 
  db:
    image: "mysql"
    ports: 
      - "3306:3306"
    container_name: "mysql-container"
    environment:
      MYSQL_ROOT_PASSWORD: "root"
      MYSQL_DATABASE: "test_db"
    volumes: 
      - "./mysql-data:/var/lib/mysql"
    networks:
      - "notes-app"
    restart: "always"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s


 ############# Django CONTAINER #############

  django:
    build:
      context: .
    container_name: "django_container"
    command: sh -c "python manage.py migrate --no-input && gunicorn notesapp.wsgi --bind 0.0.0.0:8000"
    ports:
      - "8000:8000"
    env_file:
      - ".env"
    depends_on:
      - "db"
    networks:
      - "notes-app"
    restart: "always"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8000/admin || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s




volumes:
  mysql-data:

networks:
  notes-app:
